openapi: 3.0.3
info:
  title: Melon Hub API
  version: "0.1.0"
  description: Lobby management API for Melon multiplayer server.
servers:
  - url: http://localhost:8080
  - url: https://dev-mp-01.melonsandbox.com
paths:
  /lobby:
    post:
      summary: Create lobby
      parameters:
        - in: header
          name: X-Player-ID
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                is_public:
                  type: boolean
                  default: true
                level_name:
                  type: string
                  default: city
      responses:
        "200":
          description: Lobby created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/AlreadyExists"
    get:
      summary: Get host lobby
      parameters:
        - in: header
          name: X-Player-ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lobby info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete host lobby
      parameters:
        - in: header
          name: X-Player-ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lobby deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /lobby/start:
    post:
      summary: Start lobby match
      parameters:
        - in: header
          name: X-Player-ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Match started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /lobby/by-code/{joinCode}:
    get:
      summary: Join or heartbeat lobby by code
      parameters:
        - in: header
          name: X-Player-ID
          required: true
          schema:
            type: string
        - in: path
          name: joinCode
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lobby info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Lobby full
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: lobby_full
  /lobby/by-code/{joinCode}/me:
    delete:
      summary: Leave lobby by code
      parameters:
        - in: header
          name: X-Player-ID
          required: true
          schema:
            type: string
        - in: path
          name: joinCode
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Left lobby
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Host cannot use this endpoint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: forbidden
        "404":
          $ref: "#/components/responses/NotFound"
  /lobby/by-code/{joinCode}/kick:
    post:
      summary: Kick player from lobby (admin only)
      parameters:
        - in: header
          name: X-Player-ID
          required: true
          schema:
            type: string
        - in: path
          name: joinCode
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                player_id:
                  type: string
              required: [player_id]
      responses:
        "200":
          description: Player kicked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: player_id is required
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Only current admin can kick players
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: forbidden
        "404":
          description: Lobby or player not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                lobbyNotFound:
                  value:
                    error: not_found
                playerNotFound:
                  value:
                    error: player_not_found
  /lobby/by-code/{joinCode}/visibility:
    patch:
      summary: Change lobby visibility (admin only)
      parameters:
        - in: header
          name: X-Player-ID
          required: true
          schema:
            type: string
        - in: path
          name: joinCode
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_public:
                  type: boolean
              required: [is_public]
      responses:
        "200":
          description: Lobby visibility updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: is_public is required
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Only current admin can change visibility
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: forbidden
        "404":
          $ref: "#/components/responses/NotFound"
  /v2/lobby:
    post:
      summary: Create lobby and relay room (v2)
      parameters:
        - in: header
          name: X-Player-ID
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                is_public:
                  type: boolean
                  default: true
                level_name:
                  type: string
                  default: city
      responses:
        "200":
          description: Lobby v2 created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LobbyV2Room"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/AlreadyExists"
    get:
      summary: List public lobbies (v2)
      parameters:
        - in: query
          name: cursor
          required: false
          schema:
            type: integer
            format: int64
        - in: query
          name: limit
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Lobbies list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LobbyV2ListResponse"
  /v2/lobby/by-code/{joinCode}:
    get:
      summary: Get lobby by code (v2)
      parameters:
        - in: path
          name: joinCode
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lobby v2 room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LobbyV2Room"
        "404":
          $ref: "#/components/responses/NotFound"
  /rooms/{joinCode}/mods:
    post:
      summary: Upload mod to room
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: joinCode
          required: true
          description: Room join_code
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Mod uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                required: [id]
        "400":
          description: Invalid room ID or content type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Mod too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /rooms/{joinCode}/mods/{mod_id}:
    get:
      summary: Download mod by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: joinCode
          required: true
          description: Room join_code
          schema:
            type: string
        - in: path
          name: mod_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Mod binary
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid room ID or mod ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing/invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Mod not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: UUID
  schemas:
    RoomPlayer:
      type: object
      properties:
        name:
          type: string
      required: [name]
    RoomInfo:
      type: object
      properties:
        joinCode:
          type: string
        is_public:
          type: boolean
        roomPlayers:
          type: array
          items:
            $ref: "#/components/schemas/RoomPlayer"
        roomAddress:
          type: string
        levelName:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [joinCode, is_public, roomPlayers, roomAddress, levelName, createdAt]
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
    LobbyV2Player:
      type: object
      properties:
        player_id:
          type: string
        name:
          type: string
        is_admin:
          type: boolean
      required: [player_id, name, is_admin]
    LobbyV2Room:
      type: object
      properties:
        id:
          type: integer
          format: int64
        join_code:
          type: string
        token:
          type: string
        is_public:
          type: boolean
        room_address:
          type: string
        level_name:
          type: string
        max_players:
          type: integer
        current_players:
          type: integer
        players:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/LobbyV2Player"
        created_at:
          type: string
          format: date-time
      required:
        [
          id,
          join_code,
          token,
          is_public,
          room_address,
          level_name,
          max_players,
          current_players,
          players,
          created_at,
        ]
    LobbyV2ListResponse:
      type: object
      properties:
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/LobbyV2Room"
        next_cursor:
          type: integer
          format: int64
        has_more:
          type: boolean
      required: [rooms, next_cursor, has_more]
  responses:
    Unauthorized:
      description: Missing X-Player-ID
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: unauthorized
    NotFound:
      description: Lobby or player membership not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: not_found
    AlreadyExists:
      description: Host already has a lobby
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: already_exists
            
